<script>
    // Docsify
    window.$docsify = {
        // GENERAL
        // -----------------------------------------------------------------
        name: 'FLPaperAutoSummary',
        // repo       : 'https://github.com/baicaihenxiao', 注释掉这个可以去掉右上角的github corner
        // logo: '/assets/icon/luxun.jpg',
        // coverpage  : 'coverpage.md',
        homepage: 'README.md',
        loadSidebar: 'SUMMARY.md',

        // 主题颜色
        themeColor: '#b0a4e3',

        // NAVIGATION
        // -----------------------------------------------------------------
        // alias: {
        //     '.*?/changelog': 'https://cdn.jsdelivr.net/npm/docsify-themeable@0/CHANGELOG.md',
        // },
        auto2top: false,
        // 最大在左侧目录里显示几级目录
        maxLevel: 1,
        // 不对。。- 最多显示到 h几，如果 max=1, submax=3 表示如果文件里都是h3，则目录里会显示 h3 的标题，但只要多加一个 h1 或者 h2 的标题，则只显示该 h1 或者 h2 的目录，因为 max = 1 以最大标题优先。
        subMaxLevel: 1,

        // PLUGINS
        // -----------------------------------------------------------------
        executeScript: true,
        // ga    : 'UA-153486679-2',


        // 优化 docsify 的 search 搜索功能 https://kebingzao.com/2020/09/30/docsify-search/
        search: 'auto',
        // search: {
        //     depth      : 6,
        //     noData     : 'No results!',
        //     placeholder: 'Search...'
        // },


        toc: {
            tocMaxLevel: 6,
            target: 'h1, h2, h3, h4, h5, h6'
        },

        // https://github.com/markbattistella/docsify-autoHeaders
        autoHeaders: {
            separator: 'decimal',
            custom: '-',
            levels: {
                start: '1',
                finish: '5'
            },
            scope: '#main',
            debug: false
        },

        // // https://github.com/HerbertHe/docsify-progress
        // // 展示进度
        // progress: {
        //     position: "top",
        //     color: "var(--theme-color,#42b983)",
        //     height: "3px",
        // },

        // {docsify-updated} 这个变量显示的格式
        formatUpdated: '{MM}.{DD}, {YYYY}',

        // 可以使用相对路径 https://docsify.js.org/#/configuration?id=relativepath
        // relativePath: true, 不要用这个,会使绝对路径失效

        markdown: {
            // https://marked.js.org/#/USING_PRO.md#renderer
            renderer: {
                // image: function(href, title) {
                //     return `<img src="${href}" data-origin="${href}" alt="${title}">`
                // },
                // html: function(html) {
                //     return `${html} 1`
                // },
                // paragraph: function(text) {
                //     return 'sdfa {text}'
                // }
                code: function (code, lang) {
                    if (lang === "mermaid") {
                        return (
                            '<div class="mermaid">' + mermaid.render('mermaid-svg-' + num++, code) + "</div>"
                        );
                    }

                    // 支持 pdf
                    var pdf_renderer = function (code, lang, verify) {
                        function unique_id_generator() {
                            function rand_gen() {
                                return Math.floor((Math.random() + 1) * 65536).toString(16).substring(1);
                            }

                            return rand_gen() + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + rand_gen() + rand_gen();
                        }

                        if (lang && !lang.localeCompare('pdf', 'en', {sensitivity: 'base'})) {
                            if (verify) {
                                return true;
                            } else {
                                var divId = "markdown_code_pdf_container_" + unique_id_generator().toString();
                                var container_list = new Array();
                                if (localStorage.getItem('pdf_container_list')) {
                                    container_list = JSON.parse(localStorage.getItem('pdf_container_list'));
                                }
                                container_list.push({"pdf_location": code, "div_id": divId});
                                localStorage.setItem('pdf_container_list', JSON.stringify(container_list));
                                return (
                                    '<div style="margin-top:' + PDF_MARGIN_TOP + '; margin-bottom:' + PDF_MARGIN_BOTTOM + ';" id="' + divId + '">'
                                    + '<a href="' + code + '"> Link </a> to ' + code +
                                    '</div>'
                                );
                            }
                        }
                        return false;
                    }
                    if (pdf_renderer(code, lang, true)) {
                        return pdf_renderer(code, lang, false);
                    }


                    return this.origin.code.apply(this, arguments);
                },
            }
        },

        plugins: [

            // tree 的效果是跳到该文件但不编辑，blob会自动编辑
            // https://github.com/njleonzhang/docsify-edit-on-github
            // EditOnGithubPlugin.create('https://gitee.com/baicaihenxiao/research/tree/master/', null, function(file) {return 'Edit on Gitee'}),
            EditOnGithubPlugin.create('https://github.com/baicaihenxiao/FLPaperAutoSummary/tree/main/', null, function (file) {
                return 'Edit on GitHub'
            }),

            function (hook, vm) {
                hook.init(function () {
                    // Called when the script starts running, only trigger once, no arguments,
                });

                hook.beforeEach(function (content) {
                    // Invoked each time before parsing the Markdown file.
                    // ...
                    return content + '\n\n----\n\n' + '<p style="color: inherit; font-weight: normal; text-decoration: none; color: #828282;">Last updated <b>{docsify-updated}</b></p>';

                    //每一个页面添加底部license，不好看就不加了 + '<p style="font-size:12px;text-align: center;color: #828282;"><a rel="license" href="http://creativecommons.org/licenses/by-nc-nd/3.0/"><img alt="Creative Commons License" style="border-width:0" src="https://i.creativecommons.org/l/by-nc-nd/3.0/88x31.png" /></a><br/> The content of this site is licensed under the <a rel="license" href="http://creativecommons.org/licenses/by-nc-nd/3.0/">Creative Commons Attribution-NonCommercial-NoDerivs 3.0 Unported License</a></p>';
                });

                hook.afterEach(function (html, next) {
                    // Invoked each time after the Markdown file is parsed.
                    // beforeEach and afterEach support asynchronous。
                    // ...
                    // call `next(html)` when task is done.
                    next(html);
                });

                hook.doneEach(function () {
                    // Invoked each time after the data is fully loaded, no arguments,
                    // ...
                });

                hook.mounted(function () {
                    // Called after initial completion. Only trigger once, no arguments.
                });

                hook.ready(function () {
                    // Called after initial completion, no arguments.
                });
            }
        ]
    };
</script>
